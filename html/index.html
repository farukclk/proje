<!DOCTYPE html>
<html lang="tr">
<head>
  <title>ID'li İsim Listesi</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
    }
    .input-section {
      display: flex;
      margin-bottom: 20px;
    }
    #nameInput {
      flex-grow: 1;
      padding: 8px;
      font-size: 16px;
    }
    button {
      padding: 8px 16px;
      background-color: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
      margin-left: 10px;
    }
    button.delete {
      background-color: #f44336;
      margin-left: 15px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    tr {
      border-bottom: 1px solid #ddd;
    }
    td {
      padding: 12px 0;
    }
    .id-cell {
      width: 50px;
      color: #666;
    }
    .name-cell {
      width: calc(100% - 200px);
    }
    .action-cell {
      width: 150px;
      text-align: right;
    }
  </style>
</head>
<body>
<h1>ID'li İsim Listesi</h1>

<div class="input-section">
  <input type="text" id="nameInput" placeholder="Yeni isim giriniz">
  <button onclick="addName()">Ekle</button>
</div>

<table id="nameTable">
  <!-- İsimler buraya eklenecek -->
</table>

<script>

  // var Socket;
  let ip = window.location.hostname;
  console.log(ip);
  let message = "";
  let names = "";

  Socket = new WebSocket('ws://' + ip + ':81/');
  Socket.onmessage = function(event) {
    console.log(event.data);
    try {
      var a = event.data;
      console.log(JSON.parse(a));
    }
    catch {               }

  }







  // Sayfa yüklendiğinde tabloyu oluştur
  window.onload = function() {
    // İsim listesi

    fetchUsers();
    updateTable();
  };

    const input = document.getElementById("nameInput");

    input.addEventListener("keydown", function (event) {
    if (event.key === "Enter") {
      const name = input.value;
      console.log("Girilen isim:", name);
      addName();
    }
  });



  // Tabloyu güncelle
  function updateTable() {
    const table = document.getElementById("nameTable");
    table.innerHTML = "";

    // Başlık satırı
    const headerRow = table.insertRow();
    headerRow.innerHTML = `
                <th>ID</th>
                <th>İsim</th>
                <th>İşlem</th>
            `;

    console.log(names);
    if (names == null) {
      return;
    }
    if (names.length === 0) {
      const row = table.insertRow();
      const cell = row.insertCell(0);
      cell.colSpan = 3;
      cell.textContent = "Kayıtlı isim bulunmamaktadır.";
      cell.style.textAlign = "center";
      cell.style.color = "#888";
      return;
    }

    for (let id in names) {
      console.log("Key:", id);           // "0", "1"
      console.log("Value:", names[id]); // "faruk2212"

      let name = names[id];

      const row = table.insertRow();

      // ID hücresi
      const idCell = row.insertCell(0);
      idCell.className = "id-cell";
      idCell.textContent = id;

      // İsim hücresi
      const nameCell = row.insertCell(1);
      nameCell.className = "name-cell";
      nameCell.textContent = name;

      // Sil butonu hücresi
      const actionCell = row.insertCell(2);
      actionCell.className = "action-cell";

      const deleteBtn = document.createElement("button");
      deleteBtn.textContent = "Sil";
      deleteBtn.className = "delete";
      deleteBtn.onclick = function() {
        deleteName(id);
      };

      actionCell.appendChild(deleteBtn);
    }
  }

  // Yeni isim ekle
  function addName() {
    const input = document.getElementById("nameInput");
    const name = input.value.trim();

    if (name === "") {
      alert("Lütfen bir isim giriniz!");
      return;
    }


    Socket.send(JSON.stringify({command: 'kayit', name: name}));
    input.value = "";

    // Socket.send(Json)

  }

  // İsim sil
  function deleteName(id) {
    if (confirm("Bu kaydı silmek istediğinize emin misiniz?")) {
      fetch("/delete", {
        method: "POST",
        headers: {
          "Content-Type": "application/x-www-form-urlencoded"
        },
        body: "id=" + encodeURIComponent(id)
      })
              .then(res => res.text())
              .then(data => {
                console.log("Cevap:", data);
              });
    }
  }

  function fetchUsers() {
    fetch("/users")
            .then(response => response.text())
            .then(data => {
              // gelen HTML verisini <ul> içine yaz
              //document.getElementById("user-list").innerHTML = data;
              names = JSON.parse(data);
              console.log(names);
              updateTable();

            })
            .catch(error => {
              console.error("Hata oluştu:", error);
            });


  }



</script>
</body>
</html>
